<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>イベント終了</title>
		<style>
			:root {
				color-scheme: dark;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #202124;
				font-family: "Google Sans", "Noto Sans JP", sans-serif;
				color: #e8eaed;
			}

			.container {
				width: min(92%, 640px);
				padding: 48px 40px;
				border-radius: 24px;
				background: #303134;
				box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
				text-align: center;
			}

			h1 {
				margin: 0;
				font-size: clamp(1.8rem, 4vw, 2.6rem);
				font-weight: 500;
				letter-spacing: 0.02em;
				line-height: 1.6;
			}

			p {
				margin: 20px 0 0;
				font-size: 1rem;
				color: #bdc1c6;
				line-height: 1.8;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>こちらのイベントは終了いたしました。</h1>
			<p>ご参加ありがとうございました。</p>
		</div>
	</body>
</html>
